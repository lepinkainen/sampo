server:
  port: 8080

cache:
  dir: ".cache"

roots:
  - name: "Sample"
    path: "./testdata"

# Person detection (opt-in, requires ONNX Runtime installed)
detection:
  enabled: false
  model_path: "models/yolo11n.onnx"
  model_version: "v11n-1.0"
  threshold: 0.5
  workers: 2

# CLIP image classification (opt-in, requires ONNX Runtime installed)
# Run `task download-clip-model` to export model and label embeddings
classification:
  enabled: false
  model_path: "models/clip-vit-b32-image.onnx"
  labels_path: "models/clip-labels.json"
  model_version: "clip-vit-b32-1.0"
  threshold: 0.2
  workers: 2

# OCR text extraction (opt-in). Backend is platform-gated:
#   macOS  — Vision-framework helper; run `task build-ocr` to compile bin/sampo-ocr
#   Linux  — no backend yet (self-disables); generic ONNX backend planned
ocr:
  enabled: false
  binary_path: "bin/sampo-ocr"
  model_version: "vision-1.0"
  workers: 2
