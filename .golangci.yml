version: "2"

run:
  timeout: 5m
  issues-exit-code: 1
  tests: false

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - gocritic
    - revive
    - errorlint
    - bodyclose
    - contextcheck
    - sqlclosecheck
    - noctx
    - gosec
    - unparam
    - gocyclo
  exclusions:
    paths:
      - llm-shared
    rules:
      - linters:
          - noctx
        path: internal/(classification|detection)/store\.go
        text: "must not be called"
      - linters:
          - gosec
        text: "G(301|304|703):"
      - linters:
          - gosec
        path: internal/(thumbnail|videoframe)/.*\.go
        text: "G(122|204):"
  settings:
    govet:
      enable:
        - shadow
    gocyclo:
      min-complexity: 40
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - exitAfterDefer
        - rangeValCopy
        - hugeParam
        - singleCaseSwitch
        - ifElseChain
        - paramTypeCombine
    revive:
      severity: warning
      rules:
        - name: exported
          severity: warning
          disabled: false
          arguments:
            - "checkPrivateReceivers"
            - "sayRepetitiveInsteadOfStutters"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
