server:
  port: 8080

cache:
  dir: "/cache"

roots:
  - name: "Data"
    path: "/data"

detection:
  enabled: true
  model_path: "/app/models/yolo11n.onnx"
  model_version: "v11n-1.0"
  threshold: 0.5
  workers: 2

classification:
  enabled: true
  model_path: "/app/models/clip-vit-b32-image.onnx"
  labels_path: "/app/models/clip-labels.json"
  model_version: "clip-vit-b32-1.0"
  threshold: 0.2
  workers: 2

ocr:
  enabled: true
  det_model_path: "/app/models/ppocr-det.onnx"
  rec_model_path: "/app/models/ppocr-rec.onnx"
  dict_path: "/app/models/ppocr-dict.txt"
  model_version: "ppocrv4-1.0"
  workers: 2
