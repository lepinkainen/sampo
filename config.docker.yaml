server:
  port: 8080

cache:
  dir: "/cache"

roots:
  - name: "Data"
    path: "/data"

detection:
  enabled: false
  model_path: "/app/models/yolov8n.onnx"
  model_version: "v8n-1.0"
  threshold: 0.5
  workers: 2

classification:
  enabled: false
  model_path: "/app/models/clip-vit-b32-image.onnx"
  labels_path: "/app/models/clip-labels.json"
  model_version: "clip-vit-b32-1.0"
  threshold: 0.2
  workers: 2
