---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies
      - go
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    # Match pnpm's minPackageAge=3d (frontend/.npmrc): don't open PRs for
    # versions younger than the supply-chain cooldown, else the generated
    # lockfile fails pnpm's policy check.
    cooldown:
      default-days: 3
    commit-message:
      prefix: deps
      include: scope
    labels:
      - dependencies
      - frontend
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
