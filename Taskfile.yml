version: '3'

vars:
  BUILD_DIR: build
  PROJECT_NAME: sampo
  VERSION:
    sh: |
      tag=$(git describe --tags 2>/dev/null || echo "dev")
      commit=$(git log -n 1 --format=%h 2>/dev/null || echo "none")
      if [ "$tag" = "dev" ]; then
        echo "dev-$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
      else
        echo "$tag-$commit"
      fi
  GIT_HASH:
    sh: git log -n 1 --format=%H 2>/dev/null || echo unknown
  BUILD_TIME:
    sh: date -u '+%Y-%m-%dT%H:%M:%SZ'
  GO_LDFLAGS: >-
    -X main.version={{.VERSION}}
    -X main.gitHash={{.GIT_HASH}}
    -X main.buildTime={{.BUILD_TIME}}

tasks:
  build:
    desc: Build the project
    deps: [test, lint]
    cmds:
      - task: build-frontend
      - task: build-go

  build-linux:
    desc: Build Linux binary via Docker (required because ONNX Runtime uses CGO)
    deps: [test, lint]
    cmds:
      - mkdir -p {{.BUILD_DIR}}/linux
      - docker build --platform linux/amd64 --target binary-export --output type=local,dest={{.BUILD_DIR}}/linux --build-arg VERSION={{.VERSION}} --build-arg GIT_HASH={{.GIT_HASH}} --build-arg BUILD_TIME={{.BUILD_TIME}} .

  build-ci:
    desc: Build for CI/CD (build only)
    cmds:
      - task: build-frontend
      - task: build-go

  test:
    desc: Run tests
    cmds:
      - task: test-go
      - task: test-frontend

  test-full:
    desc: Run full test suite (unit + lint + build + e2e). Run after every new feature
    cmds:
      - task: test
      - task: lint
      - task: build-frontend
      - task: build-go
      - task: dev-up
      - defer: { task: dev-down }
      - task: test-e2e

  test-e2e:
    desc: Run Playwright end-to-end tests (requires dev servers running)
    dir: frontend
    cmds:
      - pnpm exec playwright test

  test-ci:
    desc: Run tests with coverage for CI
    cmds:
      - task: test-go-ci

  lint:
    desc: Lint code
    cmds:
      - task: lint-go
      - task: lint-frontend

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - rm -rf frontend/build
      - mkdir -p {{.BUILD_DIR}}

  # Go tasks
  build-go:
    desc: Build Go project
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -v -ldflags="{{.GO_LDFLAGS}}" -o {{.BUILD_DIR}}/{{.PROJECT_NAME}} ./cmd/sampo
    sources:
      - ./**/*.go

  test-go:
    desc: Run Go tests
    cmds:
      - go test $(go list ./... | rg -v '/llm-shared(/|$)')

  test-go-ci:
    desc: Run Go tests with coverage for CI
    cmds:
      - go test -tags=ci -cover -v $(go list ./... | rg -v '/llm-shared(/|$)')

  test-frontend:
    desc: Run frontend type checking and diagnostics
    dir: frontend
    cmds:
      - pnpm install --frozen-lockfile
      - pnpm exec svelte-kit sync
      - pnpm exec svelte-check --tsconfig ./tsconfig.json

  lint-go:
    desc: Lint Go code
    cmds:
      - fd -e go --exclude llm-shared -x goimports -w {}
      - go vet $(go list ./... | rg -v '/llm-shared(/|$)')
      - golangci-lint run

  lint-frontend:
    desc: Lint and check frontend code
    dir: frontend
    cmds:
      - pnpm install --frozen-lockfile
      - pnpm exec biome check .

  # Frontend tasks
  build-frontend:
    desc: Build SvelteKit frontend
    dir: frontend
    cmds:
      - pnpm install --frozen-lockfile
      - pnpm run build

  dev:
    desc: Start development in the foreground (run backend or frontend manually in separate terminals)
    deps: [dev-frontend, dev-go]

  dev-up:
    desc: Start backend and frontend in the background
    cmds:
      - ./scripts/devctl start

  dev-down:
    desc: Stop background development services
    cmds:
      - ./scripts/devctl stop

  dev-status:
    desc: Show background development service status as prettified JSON
    cmds:
      - ./scripts/devctl status --json-pretty

  dev-restart:
    desc: Restart background development services
    cmds:
      - ./scripts/devctl restart

  dev-logs:
    desc: Show background development log locations
    cmds:
      - ./scripts/devctl logs

  dev-go:
    desc: Start Go development server
    cmds:
      - go run ./cmd/sampo

  dev-frontend:
    desc: Start frontend dev server
    dir: frontend
    cmds:
      - pnpm run dev -- --host 127.0.0.1 --port 5173

  download-model:
    desc: Download YOLOv8n and export to ONNX for person detection
    cmds:
      - mkdir -p models
      - uv run --with ultralytics --with "onnx>=1.12.0,<2.0.0" --with onnxslim --with onnxruntime python -c "from ultralytics import YOLO; model = YOLO('yolov8n.pt'); model.export(format='onnx', imgsz=640)" && mv yolov8n.onnx models/yolov8n.onnx && rm -f yolov8n.pt
    status:
      - test -f models/yolov8n.onnx

  download-clip-model:
    desc: Export CLIP ViT-B/32 image encoder to ONNX and pre-compute text embeddings
    cmds:
      - mkdir -p models
      - uv run --with transformers --with torch --with "onnx>=1.12.0,<2.0.0" --with onnxruntime --with onnxscript --with pyyaml --with pillow python scripts/export-clip.py
    status:
      - test -f models/clip-vit-b32-image.onnx
      - test -f models/clip-labels.json

  update-clip-labels:
    desc: Regenerate CLIP text embeddings from clip-labels.yaml (without re-exporting ONNX model)
    cmds:
      - mkdir -p models
      - uv run --with transformers --with torch --with pyyaml --with numpy python scripts/export-clip-labels.py

  docker-build:
    desc: Build Docker image
    cmds:
      - docker build -t {{.PROJECT_NAME}}:{{.VERSION}} .

  docker-run:
    desc: Run Docker container
    cmds:
      - docker run -p 8080:8080 {{.PROJECT_NAME}}:{{.VERSION}}
